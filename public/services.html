<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NEXUS · Painel de Serviços</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a0a; --bg-2:#141414; --bg-3:#1c1c1c;
      --text:#e8e8e8; --muted:#888; --dim:#555;
      --accent:#0099ff; --warn:#ffb000; --down:#ff3838; --idle:#444;
      --border:#222;
    }
    body{
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      padding:24px; min-height:100vh;
    }
    header{
      display:flex; justify-content:space-between; align-items:baseline;
      margin-bottom:32px; padding-bottom:16px; border-bottom:1px solid var(--border);
    }
    h1{
      font-size:32px; font-weight:900; letter-spacing:-1px;
      font-family:'JetBrains Mono','Courier New',monospace;
    }
    h1 .accent{color:var(--accent)}
    .meta{color:var(--muted); font-size:13px; font-family:'JetBrains Mono',monospace;}
    .meta .ok{color:var(--accent)}
    .meta .warn{color:var(--warn)}
    .meta .down{color:var(--down)}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:16px;
    }

    .card{
      background:var(--bg-2);
      border:1px solid var(--border);
      border-radius:8px;
      padding:20px;
      transition:transform .15s, border-color .15s;
      position:relative;
      overflow:hidden;
    }
    .card:hover{transform:translateY(-2px); border-color:#444;}
    .card.up{border-left:4px solid var(--accent)}
    .card.warn{border-left:4px solid var(--warn)}
    .card.down{border-left:4px solid var(--down)}
    .card.idle{border-left:4px solid var(--idle)}

    .card-head{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:14px;
    }
    .card-name{
      font-size:12px; font-weight:700; letter-spacing:1.5px;
      text-transform:uppercase; color:var(--muted);
      font-family:'JetBrains Mono',monospace;
    }
    .status-dot{
      display:inline-block; width:10px; height:10px; border-radius:50%;
      vertical-align:middle; margin-right:8px;
    }
    .dot-up{background:var(--accent); box-shadow:0 0 12px var(--accent);}
    .dot-warn{background:var(--warn); box-shadow:0 0 12px var(--warn);}
    .dot-down{background:var(--down); box-shadow:0 0 12px var(--down);}
    .dot-idle{background:var(--idle);}

    .card-status{
      font-size:11px; font-weight:700; padding:3px 8px; border-radius:3px;
      font-family:'JetBrains Mono',monospace;
    }
    .status-up{background:rgba(57,255,20,.15); color:var(--accent);}
    .status-warn{background:rgba(255,176,0,.15); color:var(--warn);}
    .status-down{background:rgba(255,56,56,.15); color:var(--down);}
    .status-idle{background:rgba(85,85,85,.3); color:var(--muted);}

    .metric{
      display:flex; justify-content:space-between;
      padding:6px 0; font-size:13px;
      border-top:1px dashed var(--border);
    }
    .metric:first-of-type{border-top:none;}
    .metric-key{color:var(--muted)}
    .metric-val{color:var(--text); font-family:'JetBrains Mono',monospace; font-weight:600;}
    .metric-val.ok{color:var(--accent)}
    .metric-val.warn{color:var(--warn)}
    .metric-val.down{color:var(--down)}

    .card-foot{
      margin-top:14px; padding-top:14px;
      border-top:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color:var(--dim);
    }
    .open-link{
      color:var(--accent); text-decoration:none;
      font-weight:700; font-size:11px; letter-spacing:1px;
      text-transform:uppercase; font-family:'JetBrains Mono',monospace;
    }
    .open-link:hover{text-decoration:underline}

    .commit-hash, .deploy-state{
      font-family:'JetBrains Mono',monospace; font-size:11px;
      background:var(--bg-3); padding:2px 6px; border-radius:3px;
    }

    .issue-item, .pr-item{
      font-size:12px; padding:4px 0; color:var(--muted);
      border-top:1px dashed var(--border);
    }
    .issue-item:first-child, .pr-item:first-child{border-top:none}
    .issue-level{
      display:inline-block; width:50px; font-weight:700;
      font-size:10px; text-transform:uppercase;
    }
    .level-error{color:var(--down)}
    .level-warning{color:var(--warn)}
    .level-info{color:var(--muted)}

    .skeleton{opacity:.4; pointer-events:none;}
    .err{color:var(--down); font-size:12px; margin-top:8px;}

    .progress{
      width:100%; height:6px; background:var(--bg-3);
      border-radius:3px; overflow:hidden; margin-top:4px;
    }
    .progress-bar{
      height:100%; background:var(--accent);
      transition:width .3s, background .3s;
    }
    .progress-bar.warn{background:var(--warn)}
    .progress-bar.down{background:var(--down)}

    .actions{margin-top:24px; display:flex; gap:8px; align-items:center;}
    .btn{
      background:transparent; color:var(--muted);
      border:1px solid var(--border); padding:8px 16px;
      border-radius:4px; cursor:pointer; font-size:12px;
      font-family:'JetBrains Mono',monospace; letter-spacing:1px;
      text-transform:uppercase; transition:all .15s;
    }
    .btn:hover{color:var(--text); border-color:var(--accent)}

    @media (max-width:600px){
      .grid{grid-template-columns:1fr}
      h1{font-size:24px}
      header{flex-direction:column; align-items:flex-start; gap:8px}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>NEXUS<span class="accent">·</span>SERVICES</h1>
      <div style="margin-top:8px; color:var(--muted); font-size:13px;">Status em tempo real de todos os serviços externos do sistema</div>
    </div>
    <div class="meta">
      <a href="/app" style="color:var(--accent); text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:12px;">← Painel</a>
      <div style="margin-top:4px;">Última atualização: <span id="last-update">--:--:--</span></div>
      <div>Refresh: <span id="refresh-state" class="ok">automático (30s)</span></div>
    </div>
  </header>

  <div id="grid" class="grid">
    <!-- Cards renderizados via JS -->
  </div>

  <div class="actions">
    <button class="btn" onclick="loadAll(true)">⟳ Atualizar agora</button>
    <button class="btn" onclick="toggleAuto()" id="auto-btn">⏸ Pausar auto-refresh</button>
    <a href="/app" class="btn" style="text-decoration:none;">← Voltar pro painel</a>
  </div>

  <script>
    const SERVICES_META = {
      vercel:      { label: 'VERCEL',       icon: '▲' },
      supabase:    { label: 'SUPABASE',     icon: '◆' },
      redis:       { label: 'REDIS UPSTASH',icon: '●' },
      mercadopago: { label: 'MERCADO PAGO', icon: '$' },
      sentry:      { label: 'SENTRY',       icon: '⚠' },
      uptimerobot: { label: 'UPTIME ROBOT', icon: '↑' },
      github:      { label: 'GITHUB',       icon: '⌥' },
    };

    let autoRefresh = true;
    let refreshTimer = null;

    async function loadAll(forceFresh = false) {
      try {
        const url = forceFresh ? '/api/services/all?_=' + Date.now() : '/api/services/all';
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            document.getElementById('grid').innerHTML = '<div style="color:var(--down); padding:40px;">Sem permissão. Faça login como admin pra ver este painel.</div>';
            return;
          }
          throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        renderAll(data);
        document.getElementById('last-update').textContent = new Date(data.ts).toLocaleTimeString('pt-BR');
      } catch (err) {
        document.getElementById('grid').innerHTML = `<div style="color:var(--down); padding:40px;">Erro ao carregar: ${err.message}</div>`;
      }
    }

    function renderAll(data) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (const [key, service] of Object.entries(data.services)) {
        grid.appendChild(renderCard(key, service));
      }
    }

    function renderCard(key, s) {
      const meta = SERVICES_META[key] || { label: key.toUpperCase(), icon: '·' };
      const status = s.status || 'idle';
      const card = document.createElement('div');
      card.className = `card ${status}`;

      const STATUS_LABELS = {
        up: 'OPERACIONAL', warn: 'DEGRADADO', down: 'FORA DO AR',
        'not-configured': 'NÃO CONFIGURADO', idle: 'AGUARDANDO',
      };

      let metricsHtml = '';
      if (s.error && status !== 'up') {
        metricsHtml = `<div class="err">${escapeHtml(s.error)}</div>`;
      } else {
        metricsHtml = renderMetrics(key, s.metrics || {});
      }

      const latency = s.latency_ms != null ? `${s.latency_ms}ms` : '--';

      card.innerHTML = `
        <div class="card-head">
          <div class="card-name">${meta.icon} ${meta.label}</div>
          <span class="card-status status-${status}">
            <span class="status-dot dot-${status}"></span>${STATUS_LABELS[status] || status}
          </span>
        </div>
        ${metricsHtml}
        <div class="card-foot">
          <span>resp ${latency}</span>
          <a href="${s.dashboard_url || '#'}" target="_blank" class="open-link">ABRIR PAINEL ↗</a>
        </div>
      `;
      return card;
    }

    function renderMetrics(key, m) {
      switch (key) {
        case 'vercel':
          if (!m.last_deploy) return '';
          return `
            <div class="metric"><span class="metric-key">Estado</span>
              <span class="metric-val ok">${m.last_deploy.state}</span></div>
            <div class="metric"><span class="metric-key">Branch</span>
              <span class="metric-val"><span class="commit-hash">${m.last_deploy.branch}</span></span></div>
            <div class="metric"><span class="metric-key">Commit</span>
              <span class="metric-val"><span class="commit-hash">${m.last_deploy.commit}</span></span></div>
            <div class="metric"><span class="metric-key">Deploy</span>
              <span class="metric-val">${formatRelative(m.last_deploy.created_at)}</span></div>
          `;
        case 'supabase': {
          const pct = m.free_tier_used_pct || 0;
          const cls = pct > 80 ? 'down' : (pct > 60 ? 'warn' : '');
          return `
            <div class="metric"><span class="metric-key">Tabelas</span>
              <span class="metric-val">${m.tables_count}</span></div>
            <div class="metric"><span class="metric-key">Tamanho DB</span>
              <span class="metric-val">${m.db_size}</span></div>
            <div class="metric"><span class="metric-key">Free tier</span>
              <span class="metric-val ${cls}">${pct}% de 500MB</span></div>
            <div class="progress"><div class="progress-bar ${cls}" style="width:${Math.min(pct, 100)}%"></div></div>
          `;
        }
        case 'redis':
          return `
            <div class="metric"><span class="metric-key">Ping</span>
              <span class="metric-val ok">${m.ping}</span></div>
            <div class="metric"><span class="metric-key">Memória</span>
              <span class="metric-val">${m.memory_used}</span></div>
          `;
        case 'mercadopago': {
          const ok = (b) => b ? '<span class="metric-val ok">✓ OK</span>' : '<span class="metric-val down">✗ N/D</span>';
          let html = `
            <div class="metric"><span class="metric-key">HMAC Secret</span>${ok(m.hmac_secret_configured)}</div>
            <div class="metric"><span class="metric-key">Collector ID</span>${ok(m.collector_id_configured)}</div>
            <div class="metric"><span class="metric-key">Owner Token</span>${ok(m.owner_token_configured)}</div>
          `;
          if (m.last_payment) {
            html += `
              <div class="metric"><span class="metric-key">Último pgto</span>
                <span class="metric-val">R$${m.last_payment.amount} (${m.last_payment.status})</span></div>
            `;
          }
          return html;
        }
        case 'sentry': {
          const issuesCls = (m.open_issues_24h || 0) > 5 ? 'warn' : 'ok';
          let html = `
            <div class="metric"><span class="metric-key">Issues abertas (24h)</span>
              <span class="metric-val ${issuesCls}">${m.open_issues_24h || 0}</span></div>
            <div class="metric"><span class="metric-key">Eventos (7d)</span>
              <span class="metric-val">${m.events_7d || 0}</span></div>
          `;
          if (m.top_issues && m.top_issues.length) {
            html += '<div style="margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);">';
            for (const issue of m.top_issues.slice(0, 3)) {
              html += `<div class="issue-item">
                <span class="issue-level level-${issue.level}">[${issue.level}]</span>
                ${escapeHtml(issue.title)} <span style="color:var(--dim)">×${issue.count}</span>
              </div>`;
            }
            html += '</div>';
          }
          return html;
        }
        case 'uptimerobot': {
          if (!m.monitors || !m.monitors.length) return '<div class="err">Sem monitores</div>';
          const mon = m.monitors[0];
          const cls = mon.status === 'up' ? 'ok' : 'down';
          return `
            <div class="metric"><span class="metric-key">Monitor</span>
              <span class="metric-val ${cls}">${mon.status.toUpperCase()}</span></div>
            <div class="metric"><span class="metric-key">Uptime 24h</span>
              <span class="metric-val ok">${mon.uptime_24h ? mon.uptime_24h.toFixed(2) : 'N/D'}%</span></div>
            <div class="metric"><span class="metric-key">Uptime 7d</span>
              <span class="metric-val">${mon.uptime_7d ? mon.uptime_7d.toFixed(2) : 'N/D'}%</span></div>
            <div class="metric"><span class="metric-key">Uptime 30d</span>
              <span class="metric-val">${mon.uptime_30d ? mon.uptime_30d.toFixed(2) : 'N/D'}%</span></div>
            <div class="metric"><span class="metric-key">Resposta média</span>
              <span class="metric-val">${mon.avg_response_ms || 'N/D'}ms</span></div>
          `;
        }
        case 'github': {
          let html = `
            <div class="metric"><span class="metric-key">Último commit</span>
              <span class="metric-val"><span class="commit-hash">${m.last_commit?.sha || 'N/D'}</span></span></div>
            <div class="metric"><span class="metric-key">Mensagem</span>
              <span class="metric-val" style="font-size:11px;">${escapeHtml((m.last_commit?.message || '').slice(0, 40))}</span></div>
            <div class="metric"><span class="metric-key">Quando</span>
              <span class="metric-val">${formatRelative(m.last_commit?.date)}</span></div>
            <div class="metric"><span class="metric-key">PRs abertos</span>
              <span class="metric-val">${m.open_prs}</span></div>
          `;
          return html;
        }
        default:
          return '<div style="color:var(--dim); font-size:12px;">Sem dados</div>';
      }
    }

    function formatRelative(isoDate) {
      if (!isoDate) return 'N/D';
      const diff = Date.now() - new Date(isoDate).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return 'agora';
      if (min < 60) return `${min}min atrás`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h atrás`;
      const day = Math.floor(hr / 24);
      return `${day}d atrás`;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
    }

    function toggleAuto() {
      autoRefresh = !autoRefresh;
      const btn = document.getElementById('auto-btn');
      const state = document.getElementById('refresh-state');
      if (autoRefresh) {
        btn.textContent = '⏸ Pausar auto-refresh';
        state.textContent = 'automático (30s)';
        state.className = 'ok';
        scheduleNext();
      } else {
        btn.textContent = '▶ Reativar auto-refresh';
        state.textContent = 'pausado';
        state.className = 'warn';
        if (refreshTimer) clearTimeout(refreshTimer);
      }
    }

    function scheduleNext() {
      if (refreshTimer) clearTimeout(refreshTimer);
      if (!autoRefresh) return;
      refreshTimer = setTimeout(() => { loadAll(); scheduleNext(); }, 30000);
    }

    // Boot
    loadAll();
    scheduleNext();
  </script>
</body>
</html>
