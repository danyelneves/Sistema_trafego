<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Inter', sans-serif; width: 300px; padding: 15px; background: #000; color: #fff; }
    h2 { margin-top: 0; color: #00ffcc; font-size: 16px; text-transform: uppercase; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    button:hover { background: #00d9ab; }
    .status { margin-top: 10px; font-size: 12px; color: #aaa; text-align: center; }
  </style>
</head>
<body>
  <h2>Nexus Spy 🕵️‍♂️</h2>
  <label style="font-size: 12px; margin-bottom: 5px; display: block;">API Endpoint (URL do seu Nexus OS)</label>
  <input type="text" id="api-url" value="http://localhost:3000" placeholder="https://seu-nexus.vercel.app">
  
  <label style="font-size: 12px; margin-bottom: 5px; display: block;">Workspace ID</label>
  <input type="number" id="ws-id" value="1">

  <button id="btn-extract">Extrair Criativo da Tela</button>
  <div class="status" id="status">Abra a Biblioteca de Anúncios do FB.</div>

  <script src="popup.js"></script>
</body>
</html>
